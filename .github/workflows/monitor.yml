name: Baoding teacher job monitor

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - "!docs/data/**"
      - "baoding_teacher_monitor.py"
      - "config.json"
      - "requirements.txt"
      - ".github/workflows/monitor.yml"
  schedule:
    # UTC 00:30/06:30/12:30/18:30 = 北京时间 08:30/14:30/20:30/02:30
    - cron: "30 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python baoding_teacher_monitor.py

      - name: Persist monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json docs/data/latest_jobs.json
          git diff --cached --quiet || git commit -m "chore: update monitor state"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: monitor
    steps:
      - name: Deploy PWA to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
